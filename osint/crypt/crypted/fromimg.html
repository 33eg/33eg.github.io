<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ПРОЧИТАТЬ</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
font-family: 'Courier New', Courier, monospace;
padding: 20px;
background: #fff;
color: #000;
}
.container {
max-width: 600px;
margin: 0 auto;
background: #fff;
padding: 20px;
border: 2px solid #000;
border-radius: 0;
}
h1 {
text-align: center;
color: #000;
text-transform: uppercase;
border-bottom: 2px solid #000;
padding-bottom: 10px;
margin-bottom: 20px;
font-size: 20px;
}
input, button {
width: 100%;
margin: 8px 0;
padding: 10px;
box-sizing: border-box;
border: 1px solid #000;
background: #fff;
color: #000;
font-family: inherit;
font-size: 14px;
}
input:focus {
outline: 2px solid #000;
outline-offset: -1px;
}
button {
background: #000;
color: #fff;
border: 1px solid #000;border-radius: 0;
cursor: pointer;
font-weight: bold;
text-transform: uppercase;
font-size: 15px;
}
button:hover {
background: #333;
}
#resultText {
margin-top: 15px;
padding: 10px;
background: #f5f5f5;
border: 1px solid #000;
border-radius: 0;
white-space: pre-wrap;
word-break: break-all;
cursor: pointer;
font-family: inherit;
font-size: 13px;
min-height: 40px;
}
#resultText:hover {
background: #e0e0e0;
}
#resultText.copied {
background: #000;
color: #fff;
}
#resultText.error {
background: #ffcccc;
color: #cc0000;
}
::placeholder { color: #666; }
@media (max-width: 650px) {
body { padding: 15px; }
.container { padding: 16px; }
h1 { font-size: 18px; }
input, button { font-size: 13px; padding: 9px; }
}
</style>
</head>
<body>
<div class="container">
<h1>ПРОЧИТАТЬ</h1>
<input type="file" id="outputImage" accept="image/png" />
<input type="password" id="decryptPass" placeholder="Пароль" />
<button onclick="extractTextFromImage()">Извлечь текст</button>
<div id="resultText" onclick="copyResult(this)"></div>
</div><script>
const MAGIC_HEADER = [83, 84, 69, 71];

function getRGBIndex(bitIndex) {
return bitIndex + Math.floor(bitIndex / 3);
}

async function deriveKey(password, salt) {
const enc = new TextEncoder();
const keyMaterial = await crypto.subtle.importKey(
"raw",
enc.encode(password),
{ name: "PBKDF2" },
false,
["deriveBits", "deriveKey"]
);
return await crypto.subtle.deriveKey(
{
name: "PBKDF2",
salt: salt,
iterations: 600000,
hash: "SHA-256"
},
keyMaterial,
{ name: "AES-GCM", length: 256 },
false,
["decrypt"]
);
}

async function decryptBytes(bytes, password) {
if (bytes.length < 29) throw new Error("Слишком коротко");
const salt = bytes.slice(0, 16);
const iv = bytes.slice(16, 28);
const encrypted = bytes.slice(28);
const key = await deriveKey(password, salt);
const decrypted = await crypto.subtle.decrypt({ name: "AES-GCM", iv }, key, encrypted.buffer);
return new TextDecoder().decode(decrypted);
}

function bitsToBytes(bits) {
const bytes = [];
for (let i = 0; i < bits.length; i += 8) {
let byte = 0;
for (let j = 0; j < 8 && i + j < bits.length; j++) {
byte = (byte << 1) | bits[i + j];
}
bytes.push(byte);
}
return new Uint8Array(bytes);}

function extractTextFromImage() {
const file = document.getElementById("outputImage").files[0];
const pass = document.getElementById("decryptPass").value;
const resultDiv = document.getElementById("resultText");
resultDiv.className = "";

if (!file || !pass) {
resultDiv.textContent = "Выберите PNG и введите пароль";
return;
}

const img = new Image();
img.src = URL.createObjectURL(file);
img.onload = () => {
const canvas = document.createElement("canvas");
canvas.width = img.width;
canvas.height = img.height;
const ctx = canvas.getContext("2d");
ctx.drawImage(img, 0, 0);
const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
const { data } = imageData;

// Извлекаем 64 бита заголовка (MAGIC 4 байта + длина 4 байта)
const headerBits = [];
for (let i = 0; i < 64; i++) {
const idx = getRGBIndex(i);
if (idx < data.length) headerBits.push(data[idx] & 1);
}

if (headerBits.length < 64) {
resultDiv.textContent = "Ошибка: изображение слишком маленькое";
resultDiv.className = "error";
return;
}

const headerBytes = bitsToBytes(headerBits);

// Проверяем MAGIC заголовок
for (let i = 0; i < 4; i++) {
if (headerBytes[i] !== MAGIC_HEADER[i]) {
resultDiv.textContent = "Ошибка: в этом изображении нет скрытых данных или оно повреждено";
resultDiv.className = "error";
return;
}
}

// Читаем длину из байтов 4-7 (не 0-3!)
const lenBytes = headerBytes.slice(4, 8);const length = (lenBytes[0] << 24) | (lenBytes[1] << 16) | (lenBytes[2] << 8) | lenBytes[3];

if (length <= 0 || length > 1000000) {
resultDiv.textContent = "Ошибка: неверная длина данных";
resultDiv.className = "error";
return;
}

// Извлекаем данные начиная с 64 бита (после заголовка)
const dataBits = [];
const totalBits = 64 + length * 8;
for (let i = 64; i < totalBits; i++) {
const idx = getRGBIndex(i);
if (idx < data.length) dataBits.push(data[idx] & 1);
}

try {
const dataBytes = bitsToBytes(dataBits);
decryptBytes(dataBytes, pass).then(text => {
resultDiv.textContent = text;
}).catch(e => {
resultDiv.textContent = "Ошибка: неверный пароль или данные повреждены";
resultDiv.className = "error";
});
} catch (e) {
resultDiv.textContent = "Ошибка при расшифровке: " + e.message;
resultDiv.className = "error";
}
};
}

function copyResult(el) {
if (el.textContent && el.textContent.trim() !== "" && !el.classList.contains('error')) {
if (navigator.clipboard) {
navigator.clipboard.writeText(el.textContent).then(() => {
const original = el.textContent;
el.textContent = "СКОПИРОВАНО";
el.classList.add('copied');
setTimeout(() => {
el.textContent = original;
el.classList.remove('copied');
}, 1200);
});
}
}
}
</script>
</body>
</html>
