 
<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Скрыть текст в изображении</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Courier New', Courier, monospace; padding: 20px; background: #fff; color: #000; }
.container { max-width: 600px; margin: 0 auto; background: #fff; padding: 20px; border: 2px solid #000; border-radius: 0; }
h1 { text-align: center; color: #000; text-transform: uppercase; border-bottom: 2px solid #000; padding-bottom: 10px; margin-bottom: 20px; }
h3 { text-transform: uppercase; font-size: 16px; margin-top: 25px; margin-bottom: 15px; border-bottom: 1px solid #000; padding-bottom: 5px; }
input, textarea, button { width: 100%; margin: 8px 0; padding: 10px; box-sizing: border-box; border: 1px solid #000; background: #fff; color: #000; font-family: inherit; font-size: 14px; }
input:focus, textarea:focus { outline: 2px solid #000; outline-offset: -1px; }
textarea { height: 100px; resize: vertical; }
button { background: #000; color: #fff; border: 1px solid #000; border-radius: 0; cursor: pointer; font-weight: bold; text-transform: uppercase; }
button:hover { background: #333; }
button.decrypt { background: #000; }
button.decrypt:hover { background: #333; }
.output { margin-top: 20px; text-align: center; }
.output img { max-width: 100%; border: 1px solid #000; border-radius: 0; margin-top: 10px; }
#resultText { margin-top: 15px; padding: 10px; background: #f5f5f5; border: 1px solid #000; border-radius: 0; white-space: pre-wrap; font-family: inherit; }
::placeholder { color: #666; }
.error { color: #cc0000; font-weight: bold; }
</style>
</head>
<body>
<div class="container">
<h1>Скрыть текст в изображении</h1>
<h3>1. Скрыть текст</h3>
<input type="file" id="inputImage" accept="image/png" />
<textarea id="secretText" placeholder="Секретный текст"></textarea>
<input type="password" id="encryptPass" placeholder="Пароль" />
<button onclick="hideTextInImage()">Скачать изображение с текстом</button>
<h3>2. Извлечь текст</h3>
<input type="file" id="outputImage" accept="image/png" />
<input type="password" id="decryptPass" placeholder="Пароль" />
<button class="decrypt" onclick="extractTextFromImage()">Извлечь</button>
<div id="resultText"></div>
</div>
<script>
function isSecureContext() {
return window.isSecureContext;
}
function showSecurityError() {
const resultDiv = document.getElementById("resultText");
resultDiv.textContent = "Ошибка: шифрование недоступно. Откройте страницу по HTTPS или локально.";
resultDiv.className = "error";
}
async function deriveKey(password, salt) {
const enc = new TextEncoder();
const keyMaterial = await crypto.subtle.importKey(
"raw",
enc.encode(password),
{ name: "PBKDF2" },
false,
["deriveBits", "deriveKey"]
);
return await crypto.subtle.deriveKey(
{
name: "PBKDF2",
salt: salt,
iterations: 600000,
hash: "SHA-256"
},
keyMaterial,
{ name: "AES-GCM", length: 256 },
false,
["encrypt", "decrypt"]
);
}
async function encryptText(text, password) {
const enc = new TextEncoder();
const data = enc.encode(text);
const iv = crypto.getRandomValues(new Uint8Array(12));
const salt = crypto.getRandomValues(new Uint8Array(16));
const key = await deriveKey(password, salt);
const encrypted = await crypto.subtle.encrypt({ name: "AES-GCM", iv }, key, data);
const full = new Uint8Array(16 + 12 + encrypted.byteLength);
full.set(salt, 0);
full.set(iv, 16);
full.set(new Uint8Array(encrypted), 28);
return full;
}
async function decryptBytes(bytes, password) {
if (bytes.length < 29) throw new Error("Слишком коротко");
const salt = bytes.slice(0, 16);
const iv = bytes.slice(16, 28);
const encrypted = bytes.slice(28);
const key = await deriveKey(password, salt);
const decrypted = await crypto.subtle.decrypt({ name: "AES-GCM", iv }, key, encrypted.buffer);
return new TextDecoder().decode(decrypted);
}
function bytesToBits(bytes) {
const bits = [];
for (let byte of bytes) {
for (let i = 7; i >= 0; i--) bits.push((byte >> i) & 1);
}
return bits;
}
function bitsToBytes(bits) {
const bytes = [];
for (let i = 0; i < bits.length; i += 8) {
let byte = 0;
for (let j = 0; j < 8 && i + j < bits.length; j++) {
byte = (byte << 1) | bits[i + j];
}
bytes.push(byte);
}
return new Uint8Array(bytes);
}
const MAGIC_HEADER = [83, 84, 69, 71];
async function hideTextInImage() {
if (!isSecureContext()) {
showSecurityError();
return;
}
const file = document.getElementById("inputImage").files[0];
const text = document.getElementById("secretText").value.trim();
const pass = document.getElementById("encryptPass").value;
const resultDiv = document.getElementById("resultText");
resultDiv.textContent = "";
resultDiv.className = "";
if (!file || !text || !pass) {
alert("Заполните все поля");
return;
}
if (file.type !== "image/png") {
alert("Внимание: Используйте PNG файлы для надежности. JPEG может повредить данные.");
}
try {
const encrypted = await encryptText(text, pass);
const lengthBytes = new Uint8Array(4);
const length = encrypted.length;
lengthBytes[0] = (length >> 24) & 0xFF;
lengthBytes[1] = (length >> 16) & 0xFF;
lengthBytes[2] = (length >> 8) & 0xFF;
lengthBytes[3] = length & 0xFF;
const header = new Uint8Array(MAGIC_HEADER);
const fullData = new Uint8Array(4 + 4 + encrypted.length);
fullData.set(header, 0);
fullData.set(lengthBytes, 4);
fullData.set(encrypted, 8);
const bits = bytesToBits(fullData);
const img = new Image();
img.src = URL.createObjectURL(file);
img.onload = () => {
const canvas = document.createElement("canvas");
canvas.width = img.width;
canvas.height = img.height;
const ctx = canvas.getContext("2d");
ctx.drawImage(img, 0, 0);
const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
const { data } = imageData;
if (bits.length > data.length) {
alert("Изображение слишком маленькое для этого текста!");
return;
}
for (let i = 0; i < bits.length; i++) {
data[i] = (data[i] & 0xFE) | bits[i];
}
ctx.putImageData(imageData, 0, 0);
canvas.toBlob(blob => {
const a = document.createElement("a");
a.href = URL.createObjectURL(blob);
a.download = "secret-image.png";
a.click();
resultDiv.textContent = "Изображение сохранено.";
}, "image/png");
};
} catch (e) {
resultDiv.textContent = "Ошибка шифрования: " + e.message;
resultDiv.className = "error";
}
}
function extractTextFromImage() {
if (!isSecureContext()) {
showSecurityError();
return;
}
const file = document.getElementById("outputImage").files[0];
const pass = document.getElementById("decryptPass").value;
const resultDiv = document.getElementById("resultText");
resultDiv.textContent = "";
resultDiv.className = "";
if (!file || !pass) {
alert("Выберите PNG и введите пароль");
return;
}
const img = new Image();
img.src = URL.createObjectURL(file);
img.onload = () => {
const canvas = document.createElement("canvas");
canvas.width = img.width;
canvas.height = img.height;
const ctx = canvas.getContext("2d");
ctx.drawImage(img, 0, 0);
const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
const { data } = imageData;
const headerBits = [];
for (let i = 0; i < 32; i++) {
if (i < data.length) headerBits.push(data[i] & 1);
}
if (headerBits.length < 32) {
resultDiv.textContent = "Ошибка: изображение слишком маленькое";
resultDiv.className = "error";
return;
}
const headerBytes = bitsToBytes(headerBits);
for (let i = 0; i < 4; i++) {
if (headerBytes[i] !== MAGIC_HEADER[i]) {
resultDiv.textContent = "Ошибка: в этом изображении нет скрытых данных";
resultDiv.className = "error";
return;
}
}
const lenBits = [];
for (let i = 32; i < 64; i++) {
if (i < data.length) lenBits.push(data[i] & 1);
}
const lenBytes = bitsToBytes(lenBits);
const length = (lenBytes[0] << 24) | (lenBytes[1] << 16) | (lenBytes[2] << 8) | lenBytes[3];
if (length <= 0 || length > 1000000) {
resultDiv.textContent = "Ошибка: неверная длина данных";
resultDiv.className = "error";
return;
}
const dataBits = [];
const totalBits = 64 + length * 8;
for (let i = 64; i < totalBits && i < data.length; i++) {
dataBits.push(data[i] & 1);
}
try {
const dataBytes = bitsToBytes(dataBits);
decryptBytes(dataBytes, pass).then(text => {
resultDiv.textContent = text;
}).catch(e => {
resultDiv.textContent = "Ошибка: неверный пароль или данные повреждены";
resultDiv.className = "error";
});
} catch (e) {
resultDiv.textContent = "Ошибка при расшифровке";
resultDiv.className = "error";
}
};
}
</script>
</body>
</html>
