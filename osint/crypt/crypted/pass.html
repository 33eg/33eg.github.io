<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Генератор защищённых ключей</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
font-family: 'Courier New', Courier, monospace;
padding: 15px;
background: #fff;
color: #000;
line-height: 1.4;
}
.container {
max-width: 650px;
margin: 0 auto;
background: #fff;
padding: 18px;
border: 2px solid #000;
}
h1 {
text-align: center;
text-transform: uppercase;
border-bottom: 2px solid #000;
padding-bottom: 10px;
margin-bottom: 20px;
font-size: 16px;
letter-spacing: 1px;
}
h2 {
text-transform: uppercase;
font-size: 14px;
margin-top: 22px;
margin-bottom: 12px;
border-bottom: 1px solid #000;
padding-bottom: 4px;
letter-spacing: 0.5px;
}
label {
display: block;
margin: 8px 0 4px;
font-weight: bold;
font-size: 12px;
text-transform: uppercase;
}
input[type="number"] {
width: 100%;
padding: 9px;border: 1px solid #000;
background: #fff;
color: #000;
font-family: inherit;
font-size: 13px;
}
input[type="number"]:focus {
outline: 2px solid #000;
outline-offset: -1px;
}
.options {
display: flex;
flex-wrap: wrap;
gap: 6px;
margin: 8px 0;
}
.option {
display: flex;
align-items: center;
gap: 4px;
font-size: 12px;
}
button {
width: 100%;
padding: 11px;
background: #000;
color: #fff;
border: 1px solid #000;
font-family: inherit;
font-size: 13px;
font-weight: bold;
text-transform: uppercase;
cursor: pointer;
margin: 10px 0;
}
button:hover { background: #333; }
.output {
width: 100%;
padding: 10px;
font-size: 13px;
font-family: inherit;
text-align: center;
background: #f5f5f5;
border: 1px solid #000;
margin: 10px 0;
cursor: pointer;
word-break: break-all;
min-height: 35px;
}
.output:hover { background: #e0e0e0; }.output.copied { background: #000; color: #fff; }
.meta {
text-align: center;
font-size: 11px;
margin-top: 6px;
text-transform: uppercase;
}
.section {
margin-top: 25px;
padding-top: 18px;
border-top: 1px solid #000;
}
::placeholder { color: #666; }
@media (max-width: 700px) {
body { padding: 12px; }
.container { padding: 14px; }
h1 { font-size: 14px; }
h2 { font-size: 13px; }
input, button, .output { font-size: 12px; padding: 8px; }
}
</style>
</head>
<body>
<div class="container">
<h1>Генератор защищённых ключей</h1>
<h2>Пароль</h2>
<label for="pwdLen">Длина (8–64):</label>
<input type="number" id="pwdLen" min="8" max="64" value="24" />
<label>Набор:</label>
<div class="options">
<label class="option"><input type="checkbox" id="pwdLower" checked /> a-z</label>
<label class="option"><input type="checkbox" id="pwdUpper" checked /> A-Z</label>
<label class="option"><input type="checkbox" id="pwdNum" checked /> 0-9</label>
<label class="option"><input type="checkbox" id="pwdSym" checked /> !@#$%</label>
</div>
<label class="option"><input type="checkbox" id="pwdNoSim" checked /> Без похожих (l,1,O,0)</label>
<button onclick="genPwd()">Сгенерировать</button>
<div id="pwdOut" class="output" onclick="copy(this)">Нажмите для генерации</div>
<div class="meta" id="pwdMeta"></div>
<div class="section">
<h2>Русская фраза</h2>
<label for="ruWords">Слов (4–12):</label>
<input type="number" id="ruWords" min="4" max="12" value="6" />
<div class="options">
<label class="option"><input type="checkbox" id="ruCap" /> Заглавные</label>
<label class="option"><input type="checkbox" id="ruNum" checked /> Цифры</label>
<label class="option"><input type="checkbox" id="ruSym" /> Спецсимволы</label>
</div>
<label>Разделитель:
<select id="ruSep" style="padding:6px;font-family:inherit;font-size:12px;border:1px solid #000;background:#fff;"><option value="-">дефис -</option>
<option value="_">подчёрк _</option>
<option value=".">точка .</option>
<option value="">без</option>
</select>
</label>
<button onclick="genRu()">Сгенерировать</button>
<div id="ruOut" class="output" onclick="copy(this)">Нажмите для генерации</div>
<div class="meta" id="ruMeta"></div>
</div>
<div class="section">
<h2>Latin phrase</h2>
<label for="enWords">Words (4–12):</label>
<input type="number" id="enWords" min="4" max="12" value="6" />
<div class="options">
<label class="option"><input type="checkbox" id="enCap" /> Capitalize</label>
<label class="option"><input type="checkbox" id="enNum" checked /> Numbers</label>
<label class="option"><input type="checkbox" id="enSym" /> Symbols</label>
</div>
<label>Separator:
<select id="enSep" style="padding:6px;font-family:inherit;font-size:12px;border:1px solid #000;background:#fff;">
<option value="-">hyphen -</option>
<option value="_">underscore _</option>
<option value=".">dot .</option>
<option value="">none</option>
</select>
</label>
<button onclick="genEn()">Generate</button>
<div id="enOut" class="output" onclick="copy(this)">Click to generate</div>
<div class="meta" id="enMeta"></div>
</div>
</div>

function cryptoRand(max) {
const arr = new Uint32Array(1);
crypto.getRandomValues(arr);
return arr[0] % max;
}

function genPwd() {
const len = Math.min(64, Math.max(8, parseInt(document.getElementById('pwdLen').value) || 24));
const lower = document.getElementById('pwdLower').checked;
const upper = document.getElementById('pwdUpper').checked;
const num = document.getElementById('pwdNum').checked;
const sym = document.getElementById('pwdSym').checked;
const noSim = document.getElementById('pwdNoSim').checked;
let charset = '';
let entropyPerChar = 0;
if (lower) {
charset += noSim ? 'abcdefghjkmnpqrstuvwxyz' : 'abcdefghijklmnopqrstuvwxyz';
entropyPerChar += Math.log2(noSim ? 23 : 26);
}if (upper) {
charset += noSim ? 'ABCDEFGHJKMNPQRSTUVWXYZ' : 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
entropyPerChar += Math.log2(noSim ? 23 : 26);
}
if (num) {
charset += noSim ? '23456789' : '0123456789';
entropyPerChar += Math.log2(noSim ? 8 : 10);
}
if (sym) {
charset += '!@#$%^&*()_+-=[]{}|;:,.<>?';
entropyPerChar += Math.log2(26);
}
if (!charset) {
alert('Выберите хотя бы один тип символов');
return;
}
let pwd = '';
for (let i = 0; i < len; i++) {
pwd += charset[cryptoRand(charset.length)];
}
const totalEntropy = (entropyPerChar * len).toFixed(1);
document.getElementById('pwdOut').textContent = pwd;
document.getElementById('pwdOut').classList.remove('copied');
document.getElementById('pwdMeta').textContent = 'Энтропия: ~' + totalEntropy + ' бит';
}

function genRu() {
const count = Math.min(12, Math.max(4, parseInt(document.getElementById('ruWords').value) || 6));
const cap = document.getElementById('ruCap').checked;
const addNum = document.getElementById('ruNum').checked;
const addSym = document.getElementById('ruSym').checked;
const sep = document.getElementById('ruSep').value;
const symbols = ['-','_','.','@','#','*'];

// Сначала собираем нужное количество слов
const used = new Set();
const words = [];
while (words.length < count) {
const idx = cryptoRand(ruWords.length);
const word = ruWords[idx];
if (!used.has(word)) {
used.add(word);
let w = cap ? word.charAt(0).toUpperCase() + word.slice(1) : word;
words.push(w);
}
}

// Собираем фразу с разделителями
let phrase = [];
for (let i = 0; i < words.length; i++) {phrase.push(words[i]);
if (i < words.length - 1 && sep) {
phrase.push(sep);
}
}

// Добавляем цифры между словами если нужно
if (addNum) {
const numPhrase = [];
for (let i = 0; i < phrase.length; i++) {
numPhrase.push(phrase[i]);
if (/^[а-яА-Я]+$/.test(phrase[i]) && i < phrase.length - 1 && phrase[i+1] === sep) {
numPhrase.push(String(10 + cryptoRand(90)));
}
}
phrase = numPhrase;
}

// Добавляем спецсимволы если нужно
if (addSym) {
const symPhrase = [];
for (let i = 0; i < phrase.length; i++) {
symPhrase.push(phrase[i]);
if (/^[а-яА-Я]+$/.test(phrase[i]) && i < phrase.length - 1) {
symPhrase.push(symbols[cryptoRand(symbols.length)]);
}
}
phrase = symPhrase;
}

const result = phrase.join('');
let entropy = count * 9;
if (addNum) entropy += count * 3;
if (addSym) entropy += count * 4;

document.getElementById('ruOut').textContent = result;
document.getElementById('ruOut').classList.remove('copied');
document.getElementById('ruMeta').textContent = 'Энтропия: ~' + entropy + ' бит';
}

function copy(el) {
const txt = el.textContent.trim();
if (txt && !txt.startsWith('Нажмите') && !txt.startsWith('Click')) {
navigator.clipboard.writeText(txt).then(() => {
const orig = txt;
el.textContent = 'СКОПИРОВАНО';
el.classList.add('copied');
setTimeout(() => {
el.textContent = orig;
el.classList.remove('copied');
}, 1200);
});
} else if (el.id === 'pwdOut') {
genPwd();
} else if (el.id === 'ruOut') {
genRu();
} else if (el.id === 'enOut') {
genEn();
}
}
