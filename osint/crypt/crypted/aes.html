
<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AES-256 Шифрование</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
padding: 20px;
background: #fff;
color: #000;
}
.container {
max-width: 600px;
margin: 0 auto;
background: #fff;
padding: 24px;
border: 2px solid #000;
border-radius: 0;
box-shadow: none;
}
h1 {
text-align: center;
margin-bottom: 28px;
color: #000;
font-size: 24px;
text-transform: uppercase;
}
textarea, input, button {
width: 100%;
padding: 12px;
margin: 12px 0;
border: 1px solid #000;
border-radius: 0;
font-size: 16px;
background: #fff;
color: #000;
}
textarea {
height: 120px;
resize: vertical;
font-family: monospace;
}
textarea:focus, input:focus {
outline: 2px solid #000;
outline-offset: -1px;
}
button {
background: #000;
color: #fff;
font-weight: bold;
cursor: pointer;
border: 1px solid #000;
padding: 14px;
text-transform: uppercase;
}
button:hover {
background: #333;
}
button.decrypt {
background: #000;
}
button.decrypt:hover {
background: #555;
}
#result {
background: #f5f5f5;
padding: 14px;
border: 1px solid #000;
border-radius: 0;
font-family: monospace;
white-space: pre-wrap;
word-break: break-all;
font-size: 14px;
margin-top: 16px;
max-height: 200px;
overflow-y: auto;
cursor: pointer;
user-select: text;
}
#result.copied {
background: #e0e0e0;
}
.error {
background: #000 !important;
color: #fff;
}
</style>
</head>
<body>
<div class="container">
<h1>AES-256 Шифрование</h1>
<textarea id="inputText" placeholder="Введите текст для шифрования"></textarea>
<input type="password" id="password" placeholder="Пароль" autocomplete="off" />
<button onclick="encryptText()">Зашифровать</button>
<button class="decrypt" onclick="decryptText()">Расшифровать</button>
<div id="result" onclick="copyResult(this)"></div>
</div>
<script>
function isCryptoAvailable() {
return window.crypto && window.crypto.subtle;
}
function isSecureContext() {
return window.isSecureContext;
}
function copyResult(el) {
const text = el.textContent.trim();
if (!text || text.startsWith("Ошибка")) return;
if (navigator.clipboard) {
navigator.clipboard.writeText(text).then(() => {
el.classList.add('copied');
setTimeout(() => el.classList.remove('copied'), 1200);
});
}
}
function showSecurityError() {
const resultDiv = document.getElementById("result");
resultDiv.textContent = "Ошибка: шифрование недоступно по HTTP. Откройте страницу по HTTPS или локально.";
resultDiv.className = "error";
}
async function deriveKey(pwd, salt) {
const enc = new TextEncoder();
const base = await crypto.subtle.importKey('raw', enc.encode(pwd), 'PBKDF2', false, ['deriveKey']);
return crypto.subtle.deriveKey(
{ name: 'PBKDF2', salt: salt, iterations: 600000, hash: 'SHA-256' },
base, { name: 'AES-GCM', length: 256 }, false, ['encrypt', 'decrypt']
);
}
async function encryptText() {
if (!isCryptoAvailable() || !isSecureContext()) {
showSecurityError();
return;
}
const text = document.getElementById("inputText").value.trim();
const password = document.getElementById("password").value;
const resultDiv = document.getElementById("result");
if (!text || !password) {
resultDiv.textContent = "Ошибка: введите текст и пароль";
resultDiv.className = "";
return;
}
try {
const encoder = new TextEncoder();
const data = encoder.encode(text);
const salt = crypto.getRandomValues(new Uint8Array(16));
const iv = crypto.getRandomValues(new Uint8Array(12));
const key = await deriveKey(password, salt);
const encrypted = await crypto.subtle.encrypt(
{ name: "AES-GCM", iv: iv },
key,
data
);
const full = new Uint8Array(16 + 12 + encrypted.byteLength);
full.set(salt, 0);
full.set(iv, 16);
full.set(new Uint8Array(encrypted), 28);
let binary = '';
for (let i = 0; i < full.length; i++) {
binary += String.fromCharCode(full[i]);
}
const base64 = btoa(binary);
resultDiv.textContent = base64;
resultDiv.className = "";
} catch (error) {
resultDiv.textContent = "Ошибка шифрования: " + (error.message || error);
resultDiv.className = "error";
}
}
async function decryptText() {
if (!isCryptoAvailable() || !isSecureContext()) {
showSecurityError();
return;
}
const base64 = document.getElementById("inputText").value.trim();
const password = document.getElementById("password").value;
const resultDiv = document.getElementById("result");
if (!base64 || !password) {
resultDiv.textContent = "Ошибка: введите зашифрованный текст и пароль";
resultDiv.className = "";
return;
}
try {
const binary = atob(base64);
const buf = new Uint8Array(binary.length);
for (let i = 0; i < binary.length; i++) {
buf[i] = binary.charCodeAt(i);
}
if (buf.length < 28) {
resultDiv.textContent = "Ошибка: данные слишком короткие";
resultDiv.className = "error";
return;
}
const salt = buf.slice(0, 16);
const iv = buf.slice(16, 28);
const encrypted = buf.slice(28);
const key = await deriveKey(password, salt);
const decrypted = await crypto.subtle.decrypt(
{ name: "AES-GCM", iv: iv },
key,
encrypted
);
const decoder = new TextDecoder();
const text = decoder.decode(decrypted);
resultDiv.textContent = text;
resultDiv.className = "";
} catch (error) {
resultDiv.textContent = "Ошибка расшифровки: неверный пароль или данные повреждены";
resultDiv.className = "error";
}
}
</script>
</body>
</html>
