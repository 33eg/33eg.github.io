<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Оффлайн шифрование текста</title>
  <style>
    body { font-family: sans-serif; padding: 16px; background: #f5f5f5; }
    textarea { width: 100%; height: 120px; margin: 8px 0; }
    input[type="password"] { width: 100%; padding: 8px; margin: 8px 0; }
    button { width: 100%; padding: 12px; margin: 8px 0; background: #1976d2; color: white; border: none; cursor: pointer; }
    button:hover { background: #1565c0; }
    .result { background: white; padding: 12px; border: 1px solid #ccc; white-space: pre-wrap; word-break: break-all; }
    h2 { margin-top: 24px; }
  </style>
</head>
<body>
  <h1>Оффлайн шифрование текста</h1>

  <h2>1. Зашифровать</h2>
  <textarea id="plainText" placeholder="Введите текст для шифрования"></textarea>
  <input type="password" id="encryptPass" placeholder="Пароль для шифрования">
  <button onclick="encrypt()">Зашифровать</button>
  <div id="encryptedResult" class="result" onclick="copyText(this)"></div>

  <h2>2. Расшифровать</h2>
  <textarea id="cipherText" placeholder="Вставьте зашифрованный текст"></textarea>
  <input type="password" id="decryptPass" placeholder="Пароль для расшифровки">
  <button onclick="decrypt()">Расшифровать</button>
  <div id="decryptedResult" class="result" onclick="copyText(this)"></div>

  <script>
    function str2ab(str) {
      const buf = new ArrayBuffer(str.length);
      const bufView = new Uint8Array(buf);
      for (let i = 0; i < str.length; i++) {
        bufView[i] = str.charCodeAt(i);
      }
      return buf;
    }

    function ab2str(buf) {
      return String.fromCharCode.apply(null, new Uint8Array(buf));
    }

    function ab2b64(buffer) {
      return btoa(ab2str(buffer));
    }

    function b642ab(base64) {
      const binary = atob(base64);
      const bytes = new Uint8Array(binary.length);
      for (let i = 0; i < binary.length; i++) {
        bytes[i] = binary.charCodeAt(i);
      }
      return bytes.buffer;
    }

    async function deriveKey(password, salt) {
      const enc = new TextEncoder();
      const keyMaterial = await window.crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        { name: "PBKDF2" },
        false,
        ["deriveBits", "deriveKey"]
      );
      return await window.crypto.subtle.deriveKey(
        {
          name: "PBKDF2",
          salt: salt,
          iterations: 100000,
          hash: "SHA-256"
        },
        keyMaterial,
        { name: "AES-GCM", length: 256 },
        false,
        ["encrypt", "decrypt"]
      );
    }

    async function encrypt() {
      const plainText = document.getElementById("plainText").value;
      const password = document.getElementById("encryptPass").value;
      if (!plainText || !password) {
        alert("Введите текст и пароль");
        return;
      }

      const salt = window.crypto.getRandomValues(new Uint8Array(16));
      const iv = window.crypto.getRandomValues(new Uint8Array(12));
      const key = await deriveKey(password, salt);
      const enc = new TextEncoder();
      const encrypted = await window.crypto.subtle.encrypt(
        { name: "AES-GCM", iv: iv },
        key,
        enc.encode(plainText)
      );

      const result = ab2b64(salt) + "|" + ab2b64(iv) + "|" + ab2b64(encrypted);
      document.getElementById("encryptedResult").textContent = result;
    }

    async function decrypt() {
      const cipherText = document.getElementById("cipherText").value;
      const password = document.getElementById("decryptPass").value;
      if (!cipherText || !password) {
        alert("Введите зашифрованный текст и пароль");
        return;
      }

      const parts = cipherText.split("|");
      if (parts.length !== 3) {
        alert("Неверный формат зашифрованного текста");
        return;
      }

      const salt = b642ab(parts[0]);
      const iv = b642ab(parts[1]);
      const encrypted = b642ab(parts[2]);
      const key = await deriveKey(password, salt);
      try {
        const decrypted = await window.crypto.subtle.decrypt(
          { name: "AES-GCM", iv: iv },
          key,
          encrypted
        );
        const dec = new TextDecoder();
        document.getElementById("decryptedResult").textContent = dec.decode(decrypted);
      } catch (e) {
        document.getElementById("decryptedResult").textContent = "Ошибка: неверный пароль или повреждённые данные";
      }
    }

    function copyText(el) {
      if (el.textContent) {
        navigator.clipboard.writeText(el.textContent).then(() => {
          alert("Скопировано!");
        });
      }
    }
  </script>
</body>
</html>
