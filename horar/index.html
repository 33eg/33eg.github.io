<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Astro</title>
    <style>
        * { box-sizing: border-box; }
        body { font-family: Arial, sans-serif; margin: 0; padding: 10px; background-color: #f5f5f5; color: #2c3e50; font-size: 14px; }
        .container { max-width: 750px; margin: 0 auto; }
        .card { background: white; padding: 15px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); margin-bottom: 15px; }
        h1, h2, h3 { text-align: center; color: #2c3e50; margin-top: 0; }
        h1 { font-size: 1.3em; }
        h2 { font-size: 1.1em; margin-bottom: 10px; }
        h3 { font-size: 0.95em; color: #555; text-align: left; border-bottom: 1px solid #ddd; padding-bottom: 4px; margin-bottom: 8px; }
        .btn { 
            display: block;
            width: 100%;
            padding: 12px; 
            border: none; 
            border-radius: 4px; 
            font-size: 16px; 
            font-weight: bold;
            cursor: pointer; 
            transition: background 0.2s;
            text-align: center;
            text-decoration: none;
            margin-bottom: 10px;
        }
        .btn-primary { background-color: #2c3e50; color: white; }
        .btn-primary:hover { background-color: #34495e; }
        .btn-success { background-color: #27ae60; color: white; }
        .btn-success:hover { background-color: #229954; }
        .btn-secondary { background-color: #95a5a6; color: white; }
        .btn-secondary:hover { background-color: #7f8c8d; }
        textarea {
            width: 100%;
            height: 200px;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 14px;
            font-family: Arial, sans-serif;
            resize: vertical;
            margin-bottom: 10px;
            color: #2c3e50;
        }
        .error-box { 
            background: #ffebee; 
            color: #c62828;
            padding: 12px; 
            border-radius: 4px; 
            margin-bottom: 15px; 
            display: none; 
            border-left: 5px solid #c62828; 
            font-size: 13px; 
            font-weight: bold; 
        }
        @media (max-width: 500px) {
            body { padding: 5px; font-size: 13px; }
            .card { padding: 10px; }
            textarea { font-size: 13px; height: 150px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h1>Astro</h1>
            <div id="error-display" class="error-box"></div>
        </div>

        <div class="card">
            <h2>Horar</h2>
            <a href="horar.html" target="_blank" class="btn btn-primary">Хорар</a>
            <button class="btn btn-success" onclick="loadText('prompthorar.txt', 'text-horar')">Загрузить prompt</button>
            <textarea id="text-horar" readonly placeholder="Текст загрузится сюда..."></textarea>
            <button class="btn btn-secondary" onclick="copyText('text-horar', this)">Скопировать текст</button>
        </div>

        <div class="card">
            <h2>Natal</h2>
            <a href="natalastroseek.html" target="_blank" class="btn btn-primary">From Astro-Seek</a>
            <a href="natal.html" target="_blank" class="btn btn-primary">Натальная карта</a>
            <button class="btn btn-success" onclick="loadText('promptnatal.txt', 'text-natal')">Загрузить prompt</button>
            <textarea id="text-natal" readonly placeholder="Текст загрузится сюда..."></textarea>
            <button class="btn btn-secondary" onclick="copyText('text-natal', this)">Скопировать текст</button>
        </div>
    </div>

    <script>
        function loadText(filename, textareaId) {
            const errBox = document.getElementById('error-display');
            errBox.style.display = 'none';
            
            fetch(filename)
                .then(response => {
                    if (!response.ok) {
                        throw new Error('Ошибка сети или файл не найден');
                    }
                    return response.text();
                })
                .then(text => {
                    document.getElementById(textareaId).value = text;
                })
                .catch(error => {
                    errBox.innerHTML = "Ошибка: " + error.message + ". Убедитесь, что вы открыли эту страницу через локальный сервер или приложение для редактирования кода, а не просто как файл.";
                    errBox.style.display = 'block';
                    document.getElementById(textareaId).value = '';
                });
        }

        function copyText(textareaId, btnElement) {
            const textarea = document.getElementById(textareaId);
            if (!textarea.value) {
                alert('Сначала загрузите текст');
                return;
            }
            
            textarea.select();
            textarea.setSelectionRange(0, 99999);
            
            navigator.clipboard.writeText(textarea.value)
                .then(() => {
                    const originalText = btnElement.innerText;
                    btnElement.innerText = 'Скопировано!';
                    btnElement.style.backgroundColor = '#27ae60';
                    setTimeout(() => {
                        btnElement.innerText = originalText;
                        btnElement.style.backgroundColor = '#95a5a6';
                    }, 2000);
                })
                .catch(err => {
                    alert('Не удалось скопировать текст автоматически. Пожалуйста, выделите текст вручную и используйте копирование.');
                });
        }
    </script>
</body>
</html>
